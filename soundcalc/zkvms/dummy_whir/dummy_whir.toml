# A dummy zkVM just for demonstration purposes
# It uses WHIR and targets 128-bit security.
# The recursion architecture is copied from the Pico zkVM.
#
# From the pico docs:
# -----------------------------------------------------------------------------
# RISCV → CONVERT → COMBINE → COMPRESS → EMBED
#
# - RISCV: Base STARK proof that emulates one RISC-V chunk and exposes the VM
#   state (PC, chunk number etc.) as public values.
# - CONVERT: A 1-to-1 recursion circuit that verifies a single RISCV proof.
# - COMBINE: A 2-to-1 recursion circuit that verifies two CONVERT proofs and
#   produces a new proof whose public values represent the combined execution
#   interval of both chunks.
# - COMPRESS: A 1-to-1 recursion circuit that verifies a single COMBINE proof
#   and re-proves the same statement using a "tighter" FRI configuration
#   (larger log_blowup, fewer queries) to compress the proof size.
# - EMBED: A 1-to-1 recursion circuit that verifies a single COMPRESS proof and
#   "embeds" it into the BN254 world: arithmetic stays over KoalaBear, while
#   commitments and the Fiat–Shamir transcript are moved to BN254/Poseidon2 to
#   make the proof Groth16-friendly.
# -----------------------------------------------------------------------------



[zkevm]
name = "DummyWHIR"
protocol_family = "WHIR"
field = "Goldilocks^3"
hash_size_bits = 256


[[circuits]]
name = "riscv"
log_inv_rate = 4  # rate 1/16
num_iterations = 5
folding_factor = 4
log_degree = 22
batch_size = 200
power_batching = true
constraint_degree = 8
num_queries = [55, 31, 22, 17, 14]
num_ood_samples = [1, 1, 1, 1]

# grinding bits (ceiling of computed values to ensure 128-bit security)
grinding_batching_phase = 21
grinding_bits_folding = [[16, 14, 12, 10], [14, 12, 10, 8], [17, 15, 13, 11], [19, 17, 15, 13], [22, 20, 18, 16]]
grinding_bits_queries = [22, 22, 20, 19, 17]
grinding_bits_ood = [0, 0, 0, 0]

# --- Lookup entries for riscv (base circuit, mirrors Pico's lookup types) ---
# Sizes are proportional to Pico's riscv lookups, scaled to log_degree=22.
[[circuits.lookups]]
name = "alu"
logup_type = "multivariate"
rows_L = 58720256   # ~14x trace (ALU operations across all chips)
rows_T = 33554432   # 2^25 (ALU table)
num_columns_S = 14
num_lookups_M = 1
alphabet_size_H = 4194304  # 2^22
grinding_bits_lookup = 0

[[circuits.lookups]]
name = "byte"
logup_type = "multivariate"
rows_L = 352321536  # ~84x trace (byte decompositions are very frequent)
rows_T = 589824     # small fixed byte table
num_columns_S = 6
num_lookups_M = 1
alphabet_size_H = 4194304  # 2^22
grinding_bits_lookup = 0

[[circuits.lookups]]
name = "memory"
logup_type = "multivariate"
