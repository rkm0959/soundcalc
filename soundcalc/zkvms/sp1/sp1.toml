# SP1 Hypercube VM Configuration

[zkevm]
name = "SP1"
protocol_family = "JAGGED"
field = "KoalaBear^4"
hash_size_bits = 248

[[circuits]]
name = "core"
udr_only = true
blowup_factor = 4
rho = 0.25
trace_length = 4194304 # 2^22
trace_columns = 3728
dense_length = 2097152 # 2^21
dense_batch = 193 # 2^8 - 2^6 + 1
num_constraints = 3412
air_max_degree = 3
# SP1 has no "next row" constraints.
opening_points = 1
# We batch using the random `eq` polynomials.
power_batching = false
multilinear_batching = true
multilinear_zerocheck = true
num_queries = 124
fri_folding_factors = [2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2]
fri_early_stop_degree = 4
grinding_batching_phase = 1
grinding_query_phase = 16

[[circuits.lookups]]
name = "lookup"
logup_type = "multivariate"
rows_L = 4194304
rows_T = 0
num_columns_S = 107
num_lookups_M = 1900
grinding_bits_lookup = 12
multilinear_fingerprint = true


[[circuits]]
name = "compress"
udr_only = true
blowup_factor = 4
rho = 0.25
trace_length = 2097152 # 2^21
trace_columns = 326
dense_length = 1048576 # 2^20
dense_batch = 128 # can be changed to 86
num_constraints = 204
air_max_degree = 3
# SP1 has no "next row" constraints.
opening_points = 1
# We batch using the random `eq` polynomials.
power_batching = false
multilinear_batching = true
multilinear_zerocheck = true
num_queries = 124
fri_folding_factors = [2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2]
fri_early_stop_degree = 4
grinding_query_phase = 16

[[circuits.lookups]]
name = "lookup"
logup_type = "multivariate"
rows_L = 2097152
rows_T = 0
num_columns_S = 6
num_lookups_M = 53
grinding_bits_lookup = 12
multilinear_fingerprint = true
